[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  VITE_VARIANT = "full"

# Proxy API calls to the upstream worldmonitor.app (transparent to browser)
[[redirects]]
  from = "/api/*"
  to = "https://worldmonitor.app/api/:splat"
  status = 200
  force = true

# SPA fallback — must come AFTER api/* redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashed JS/CSS: cache 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html: never cache
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Service worker: always revalidate
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers on all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
